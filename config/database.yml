default: &default
  adapter: mysql2
  encoding: utf8mb4
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password: <%= ENV.fetch("MYSQL_ROOT_PASSWORD") { "rootpassword" } %>
  host: <%= ENV.fetch("DB_HOST") { "db" } %>
  port: <%= ENV.fetch("MYSQL_PORT") { 3306 } %>

development:
  <<: *default
  database: quiz_development


test:
  <<: *default
  database: quiz_test


production:
  primary: &primary_production
    <<: *default
    database: quiz_production
    username: quiz
    password: <%= ENV["QUIZ_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: quiz_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: quiz_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: quiz_production_cable
    migrations_paths: db/cable_migrate
